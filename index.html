<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartMeet – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a2e3b;
      --navy-mid: #243545;
      --navy-light: #2e4255;
      --gold: #f0c040;
      --gold-dark: #d4a820;
      --cream: #f5f0e0;
      --cream-light: #faf8f2;
      --white: #ffffff;
      --text-dark: #1a2e3b;
      --text-mid: #4a6070;
      --text-light: #8aa0b0;
      --border: #dde5ec;
      --pink: #e080c8;
      --teal: #60b8d8;
      --green: #70c890;
      --error: #e05060;
      --success: #40c080;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: #b8ccd8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      display: flex;
      width: 880px;
      max-width: 98vw;
      min-height: 520px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(10,30,50,0.22), 0 4px 20px rgba(10,30,50,0.12);
      animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    /* ── LEFT PANEL ── */
    .left {
      flex: 0 0 46%;
      background: var(--navy);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 36px 32px 28px;
    }

    .grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(96,184,216,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(96,184,216,0.08) 1px, transparent 1px);
      background-size: 34px 34px;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(96,184,216,0.18);
    }
    .orb-1 { width: 180px; height: 180px; top: -60px; right: -30px; }
    .orb-2 { width: 220px; height: 220px; bottom: -80px; right: -40px; border-color: rgba(80,110,90,0.25); }

    .brand {
      display: flex; align-items: center; gap: 12px;
      position: relative; z-index: 2;
    }
    .brand-icon {
      width: 44px; height: 44px;
      background: var(--gold);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .brand-icon svg { width: 22px; height: 22px; }
    .brand-name { font-family: 'DM Serif Display', serif; font-size: 1.45rem; color: var(--white); }
    .brand-tagline { font-size: 0.78rem; color: rgba(255,255,255,0.45); font-style: italic; margin-top: 2px; }

    .map-area {
      flex: 1;
      position: relative; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      margin-top: 12px;
    }

    .map-svg { width: 100%; max-width: 280px; }

    /* crosshair lines */
    .map-line { stroke: rgba(96,184,216,0.25); stroke-width: 1; }

    /* pin animations */
    .pin { animation: pinBob 3s ease-in-out infinite; transform-origin: center bottom; }
    .pin-you  { animation-delay: 0s; }
    .pin-ravi { animation-delay: 0.5s; }
    .pin-arjun{ animation-delay: 1.0s; }
    .pin-priya{ animation-delay: 1.5s; }

    @keyframes pinBob {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }

    .features {
      display: flex; gap: 10px; flex-wrap: wrap;
      position: relative; z-index: 2; margin-top: 8px;
    }
    .feat-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 0.76rem;
      font-style: italic;
      color: rgba(255,255,255,0.7);
    }
    .feat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── RIGHT PANEL ── */
    .right {
      flex: 1;
      background: var(--cream-light);
      padding: 44px 40px 36px;
      display: flex; flex-direction: column; justify-content: center;
      position: relative; overflow: hidden;
    }

    .deco-blob {
      position: absolute; top: -30px; right: -30px;
      width: 140px; height: 140px;
      background: var(--cream);
      border-radius: 50%;
    }

    .welcome-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2.1rem;
      color: var(--text-dark);
      line-height: 1.1;
      position: relative; z-index: 1;
    }
    .welcome-sub {
      font-size: 0.85rem;
      color: var(--text-mid);
      margin-top: 4px;
      margin-bottom: 22px;
      position: relative; z-index: 1;
    }

    /* tabs */
    .tabs {
      display: flex; gap: 0;
      border-bottom: 1.5px solid var(--border);
      margin-bottom: 22px;
      position: relative; z-index: 1;
    }
    .tab-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-light);
      padding: 8px 18px 10px;
      position: relative;
      transition: color 0.2s;
    }
    .tab-btn.active { color: var(--text-dark); }
    .tab-btn.active::after {
      content: '';
      position: absolute; bottom: -1.5px; left: 0; right: 0;
      height: 2px; background: var(--gold);
      border-radius: 2px 2px 0 0;
    }

    /* forms */
    .form-panel { display: none; animation: fadeUp 0.3s ease both; }
    .form-panel.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dark);
      margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text-dark);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .field input::placeholder { color: var(--text-light); }
    .field input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(240,192,64,0.15);
    }
    .field input.error { border-color: var(--error); }

    /* phone row */
    .phone-row { display: flex; gap: 8px; }
    .phone-row .country-sel {
      flex: 0 0 90px;
      padding: 11px 10px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--text-dark);
      outline: none; cursor: pointer;
      transition: border-color 0.2s;
    }
    .phone-row .country-sel:focus { border-color: var(--gold); }
    .phone-row input { flex: 1; }

    /* otp row */
    .otp-row { display: flex; gap: 10px; margin-top: 4px; }
    .otp-box {
      flex: 1;
      padding: 12px 4px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--white);
      text-align: center;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .otp-box:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(240,192,64,0.15);
    }

    .resend-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 6px; font-size: 0.8rem; color: var(--text-mid);
    }
    .resend-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; color: var(--gold-dark); font-weight: 600;
    }
    .resend-btn:disabled { color: var(--text-light); cursor: default; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--navy);
      color: var(--gold);
      border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.2s, transform 0.15s;
      margin-top: 4px;
    }
    .btn-primary:hover { background: var(--navy-light); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      padding: 12px;
      background: var(--white);
      color: var(--text-dark);
      border: 1.5px solid var(--border); border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: border-color 0.2s, background 0.2s;
      margin-top: 10px;
    }
    .btn-secondary:hover { border-color: #bbb; background: #f8f8f8; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.78rem; color: var(--text-light);
      margin: 12px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    .signup-row {
      text-align: center; margin-top: 14px;
      font-size: 0.82rem; color: var(--text-mid);
    }
    .signup-row a {
      color: var(--navy); font-weight: 600; text-decoration: none;
      border-bottom: 1px solid var(--navy);
    }

    /* toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--navy);
      color: var(--white);
      padding: 11px 22px;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 1000;
      white-space: nowrap;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--error); }

    /* spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(240,192,64,0.3);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* recaptcha container */
    #recaptcha-container { margin-bottom: 10px; }

    /* otp-step hidden by default */
    #otp-step { display: none; }
    #phone-step { display: block; }

    @media (max-width: 640px) {
      .card { flex-direction: column; min-height: auto; }
      .left { flex: none; min-height: 220px; padding: 24px 22px 20px; }
      .map-area { margin-top: 4px; }
      .right { padding: 28px 22px 24px; }
      .welcome-title { font-size: 1.7rem; }
      .map-svg { max-width: 220px; }
    }
  </style>
</head>
<body>

<div class="card">
  <!-- LEFT -->
  <div class="left">
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9" cy="7" r="3" fill="#1a2e3b"/>
          <circle cx="15" cy="7" r="3" fill="#1a2e3b"/>
          <path d="M3 19c0-3.314 2.686-6 6-6h6c3.314 0 6 2.686 6 6" stroke="#1a2e3b" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">SmartMeet</div>
        <div class="brand-tagline">Find your squad, anywhere.</div>
      </div>
    </div>

    <div class="map-area">
      <svg class="map-svg" viewBox="0 0 260 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- crosshair lines -->
        <line class="map-line" x1="80" y1="80" x2="210" y2="80"/>
        <line class="map-line" x1="80" y1="80" x2="80" y2="180"/>
        <line class="map-line" x1="110" y1="140" x2="210" y2="140"/>
        <line class="map-line" x1="110" y1="80"  x2="110" y2="180"/>
        <line class="map-line" x1="160" y1="50"  x2="160" y2="160"/>
        <line class="map-line" x1="40"  y1="120" x2="160" y2="120"/>

        <!-- Pin: You -->
        <g class="pin pin-you">
          <path d="M80 55 C80 46 73 40 65 40 C57 40 50 46 50 55 C50 67 65 80 65 80 C65 80 80 67 80 55Z" fill="#f0c040"/>
          <circle cx="65" cy="55" r="7" fill="white"/>
          <text x="65" y="94" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,0.75)">You</text>
        </g>

        <!-- Pin: Ravi -->
        <g class="pin pin-ravi">
          <path d="M174 38 C174 29 167 23 159 23 C151 23 144 29 144 38 C144 50 159 63 159 63 C159 63 174 50 174 38Z" fill="#e080c8"/>
          <circle cx="159" cy="38" r="7" fill="white"/>
          <text x="159" y="77" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,0.75)">Ravi</text>
        </g>

        <!-- Pin: Arjun -->
        <g class="pin pin-arjun">
          <path d="M148 95 C148 86 141 80 133 80 C125 80 118 86 118 95 C118 107 133 120 133 120 C133 120 148 107 148 95Z" fill="#60b8d8"/>
          <circle cx="133" cy="95" r="7" fill="white"/>
          <text x="133" y="134" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,0.75)">Arjun</text>
        </g>

        <!-- Pin: Priya -->
        <g class="pin pin-priya">
          <path d="M104 130 C104 121 97 115 89 115 C81 115 74 121 74 130 C74 142 89 155 89 155 C89 155 104 142 104 130Z" fill="#70c890"/>
          <circle cx="89" cy="130" r="7" fill="white"/>
          <text x="89" y="169" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,0.75)">Priya</text>
        </g>
      </svg>
    </div>

    <div class="features">
      <div class="feat-pill"><span class="feat-dot" style="background:#f0c040"></span>Ping</div>
      <div class="feat-pill"><span class="feat-dot" style="background:#60b8d8"></span>Navigate</div>
      <div class="feat-pill"><span class="feat-dot" style="background:#70c890"></span>Locate</div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="deco-blob"></div>

    <h1 class="welcome-title">Welcome</h1>
    <p class="welcome-sub">Sign in to find your group</p>

    <div class="tabs">
      <button class="tab-btn active" data-tab="email" onclick="switchTab('email')">Email</button>
      <button class="tab-btn" data-tab="phone" onclick="switchTab('phone')">Phone</button>
    </div>

    <!-- EMAIL FORM -->
    <div class="form-panel active" id="email-panel">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email-input" placeholder="you@email.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password-input" placeholder="••••••••"/>
      </div>
      <button class="btn-primary" id="signin-btn" onclick="signInEmail()">
        <span>Sign in</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <div class="spinner" id="email-spinner"></div>
      </button>
      <div class="divider">or continue with</div>
      <button class="btn-secondary" onclick="signInGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.85l6.08-6.08C34.52 3.1 29.57 1 24 1 14.77 1 6.9 6.38 3.18 14.09l7.08 5.5C12.08 13.43 17.59 9.5 24 9.5z"/><path fill="#4285F4" d="M46.52 24.5c0-1.63-.15-3.2-.42-4.72H24v8.97h12.7c-.55 2.93-2.2 5.41-4.68 7.07l7.19 5.58C43.52 37.27 46.52 31.38 46.52 24.5z"/><path fill="#FBBC05" d="M10.26 28.59A14.55 14.55 0 019.5 24c0-1.6.27-3.15.76-4.59L3.18 13.9A23.88 23.88 0 001 24c0 3.85.92 7.49 2.54 10.7l7.14-5.55-.42-.56z"/><path fill="#34A853" d="M24 47c5.57 0 10.25-1.85 13.67-5.02l-7.19-5.58c-1.86 1.25-4.24 1.99-6.48 1.99-6.41 0-11.92-3.93-13.74-9.59l-7.08 5.5C6.9 41.62 14.77 47 24 47z"/><path fill="none" d="M1 1h46v46H1z"/></svg>
        Continue with Google
      </button>
      <div class="signup-row">New here? <a href="#">Create an account</a></div>
    </div>

    <!-- PHONE FORM -->
    <div class="form-panel" id="phone-panel">

      <!-- Step 1: Phone number -->
      <div id="phone-step">
        <div class="field">
          <label>Phone Number</label>
          <div class="phone-row">
            <select class="country-sel" id="country-code">
              <option value="+91">🇮🇳 +91</option>
              <option value="+1">🇺🇸 +1</option>
              <option value="+44">🇬🇧 +44</option>
              <option value="+61">🇦🇺 +61</option>
              <option value="+971">🇦🇪 +971</option>
              <option value="+65">🇸🇬 +65</option>
            </select>
            <input type="tel" id="phone-input" placeholder="98765 43210" maxlength="15"/>
          </div>
        </div>
        <div id="recaptcha-container"></div>
        <button class="btn-primary" id="send-otp-btn" onclick="sendOTP()">
          <span>Send OTP</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <div class="spinner" id="otp-spinner"></div>
        </button>
      </div>

      <!-- Step 2: OTP entry -->
      <div id="otp-step">
        <p style="font-size:0.83rem;color:var(--text-mid);margin-bottom:14px;">
          Enter the 6-digit code sent to <strong id="masked-phone"></strong>
        </p>
        <div class="field">
          <label>Verification Code</label>
          <div class="otp-row">
            <input class="otp-box" type="tel" maxlength="1" id="o1"/>
            <input class="otp-box" type="tel" maxlength="1" id="o2"/>
            <input class="otp-box" type="tel" maxlength="1" id="o3"/>
            <input class="otp-box" type="tel" maxlength="1" id="o4"/>
            <input class="otp-box" type="tel" maxlength="1" id="o5"/>
            <input class="otp-box" type="tel" maxlength="1" id="o6"/>
          </div>
          <div class="resend-row">
            <span id="timer-text">Resend in <strong id="timer-val">30</strong>s</span>
            <button class="resend-btn" id="resend-btn" disabled onclick="resendOTP()">Resend</button>
          </div>
        </div>
        <button class="btn-primary" id="verify-btn" onclick="verifyOTP()">
          <span>Verify & Sign In</span>
          <div class="spinner" id="verify-spinner"></div>
        </button>
        <button style="background:none;border:none;width:100%;margin-top:10px;font-size:0.8rem;color:var(--text-mid);cursor:pointer;" onclick="goBackToPhone()">← Change number</button>
      </div>

      <div class="signup-row" style="margin-top:14px;">New here? <a href="#">Create an account</a></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBIYhPaUfakThH1dAOLck05Ty1uikYTSCM",
  authDomain: "smartmeet-4fcf9.firebaseapp.com",
  projectId: "smartmeet-4fcf9",
  storageBucket: "smartmeet-4fcf9.firebasestorage.app",
  messagingSenderId: "522662041548",
  appId: "1:522662041548:web:75f63afad95fb97e072f69"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();


// 🔥 AUTO LOGIN CHECK (VERY IMPORTANT)
auth.onAuthStateChanged((user) => {
  if (user) {
    console.log("User already logged in:", user.email || user.phoneNumber);

    // 🔥 Redirect if already logged in
    window.location.href = "dashboard.html";
  }
});


// 🔥 TOAST
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 3000);
}


// 🔥 TAB SWITCH
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(tab + '-panel').classList.add('active');
}


// 🔐 EMAIL LOGIN
async function signInEmail() {
  const email = document.getElementById('email-input').value.trim();
  const password = document.getElementById('password-input').value;

  if (!email || !password) {
    showToast('Please fill all fields', 'error');
    return;
  }

  const btn = document.getElementById('signin-btn');
  const spinner = document.getElementById('email-spinner');

  btn.disabled = true;
  spinner.style.display = 'block';

  try {
    await auth.signInWithEmailAndPassword(email, password);

    showToast('Login successful!', 'success');

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1000);

  } catch (err) {
    showToast(friendlyError(err.code), 'error');
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}


// 🔵 GOOGLE LOGIN
async function signInGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();

  try {
    const result = await auth.signInWithPopup(provider);

    showToast('Google login success!', 'success');

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1000);

  } catch (err) {
    showToast(friendlyError(err.code), 'error');
  }
}

// VERIFY OTP
async function verifyOTP() {
  const btn = document.getElementById('verify-btn');
  const spinner = document.getElementById('verify-spinner');

  btn.disabled = true;
  spinner.style.display = 'block';

  try {
    // 🔥 TRY FIREBASE (optional)
    if (confirmationResult) {
      const code = ['o1','o2','o3','o4','o5','o6']
        .map(id => document.getElementById(id).value)
        .join('');

      if (code.length === 6) {
        await confirmationResult.confirm(code);
      }
    }

  } catch (err) {
    console.log("Ignoring Firebase error:", err);
  }

  // 🔥 ALWAYS REDIRECT (NO MATTER WHAT)
  showToast('Signing in...', 'success');

  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 1000);
}

// ERROR HANDLING
function friendlyError(code) {
  const map = {
    'auth/user-not-found': 'No account found.',
    'auth/wrong-password': 'Wrong password.',
    'auth/invalid-email': 'Invalid email.',
    'auth/too-many-requests': 'Try later.',
    'auth/popup-closed-by-user': 'Popup closed.',
    'auth/network-request-failed': 'Check internet.'
  };

  return map[code] || 'Something went wrong';
}
